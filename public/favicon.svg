<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1033"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="40%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>

  <!-- Letter N with gradient -->
  <text
    x="5"
    y="24"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="22"
    font-weight="900"
    fill="url(#nGrad)"
    filter="url(#glow)"
  >N</text>

  <!-- AI dot accent -->
  <circle cx="27" cy="7" r="3" fill="url(#dotGrad)" opacity="0.9"/>
</svg>
